<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Blocks - Mobile Optimized</title>
    
    <script src="https://pl28980106.profitablecpmratenetwork.com/20/bd/f4/20bdf4fc49430a4adf6663e28963e137.js"></script>

    <style>
        :root { --gold: #FFD700; --bg: #3a221a; --text: #ffffff; }
        * { touch-action: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Arial Black', sans-serif; overflow: hidden; }
        
        #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; }

        /* FIXED AD BOXES FOR MOBILE */
        .ad-container { 
            width: 100%; 
            background: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-shrink: 0;
            z-index: 2000;
        }
        .ad-top { height: 60px; border-bottom: 2px solid var(--gold); }
        .ad-bottom { height: 75px; border-top: 2px solid var(--gold); } /* Increased height for visibility */

        /* MAIN SCREEN AREA */
        .screen-container { flex-grow: 1; position: relative; overflow: hidden; }
        .screen { 
            position: absolute; inset: 0;
            display: none; flex-direction: column; 
            align-items: center; justify-content: center; 
            background: var(--bg); z-index: 10; 
        }
        .active { display: flex !important; }

        /* GHOST CLICK SHIELD */
        #shield { position: fixed; inset: 0; z-index: 9999; display: none; background: transparent; }

        .logo-text-main { font-size: 3rem; font-weight: 900; color: var(--gold); text-align: center; line-height: 1; }
        .btn-outline { background: rgba(255, 215, 0, 0.05); border: 1.5px solid var(--gold); color: var(--gold); padding: 15px 30px; border-radius: 8px; cursor: pointer; margin: 8px; min-width: 200px; font-weight: bold; }
        
        .mission-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; padding: 15px; overflow-y: auto; max-height: 80%; }
        .m-node { aspect-ratio: 1; background: #111; border: 1px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #444; font-size: 16px; }
        .m-unlocked { border-color: var(--gold); color: var(--gold); background: #1a1a1a; }

        #game-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 10px 0; }
        .hex-node { width: 65px; height: 65px; background: #111; border: 2px solid var(--gold); clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: var(--gold); }
        .hex-active { background: var(--gold); color: #000; scale: 1.1; }
        .slot { width: 30px; height: 35px; border-bottom: 3px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--gold); font-weight: 900; }
    </style>
</head>
<body>

<div id="shield"></div> <div id="app">
    <div class="ad-container ad-top">
        <script type="text/javascript">
            atOptions = { 'key' : 'e554307db5af71bb93a1bdbca30869f3', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
            document.write('<scr' + 'ipt type="text/javascript" src="https://www.highperformanceformat.com/e554307db5af71bb93a1bdbca30869f3/invoke.js"></scr' + 'ipt>');
        </script>
    </div>

    <div class="screen-container">
        <div id="scr-start" class="screen active">
            <div class="logo-text-main">ROYAL<br><span style="font-size: 1.8rem;">BLOCKS</span></div>
            <button class="btn-outline" style="margin-top:40px;" onpointerdown="go('scr-mode')">PLAY NOW</button>
        </div>

        <div id="scr-mode" class="screen">
            <h2 style="color:var(--gold);">CHALLENGE</h2>
            <button class="btn-outline" onpointerdown="setMode(5)">5 LETTERS</button>
            <button class="btn-outline" onpointerdown="setMode(6)">6 LETTERS</button>
            <button class="btn-outline" onpointerdown="setMode(8)">8 LETTERS</button>
        </div>

        <div id="scr-mission" class="screen">
            <h3 id="mode-title" style="color:var(--gold)"></h3>
            <div class="mission-grid" id="m-list"></div>
            <button class="btn-outline" style="min-width:140px; margin-top:10px;" onpointerdown="go('scr-mode')">BACK</button>
        </div>

        <div id="scr-game" class="screen">
            <div id="preview-bar" style="display:flex; gap:8px; margin-bottom:20px;"></div>
            <div id="game-board"></div>
            <div id="msg" style="height:25px; margin:8px; color:var(--gold); font-size:14px;">DRAG TO CONNECT</div>
            <div style="display:flex; gap:10px;">
                <button class="btn-outline" style="min-width:90px; padding:10px;" onpointerdown="startLevel()">RESET</button>
                <button onpointerdown="getHint(event)" style="background:var(--gold); border:none; padding:10px 25px; border-radius:50px; font-weight:bold; color:#000;">HINT</button>
            </div>
            <button style="background:none; border:none; color:#666; margin-top:20px;" onpointerdown="go('scr-mission')">QUIT</button>
        </div>
    </div>

    <div class="ad-container ad-bottom">
        <script type="text/javascript">
            atOptions = { 'key' : 'ba4d673a74e1bec3358fc1f6be3542c3', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
            document.write('<scr' + 'ipt type="text/javascript" src="https://www.highperformanceformat.com/ba4d673a74e1bec3358fc1f6be3542c3/invoke.js"></scr' + 'ipt>');
        </script>
    </div>
</div>

<script>
    let mode = 5, lvl = 1, activeWord = "", selected = [], isDrawing = false;
    const bank = {
        5: ["ROYAL", "SMART", "LIGHT", "DREAM", "POWER", "BRAIN", "WORLD", "MUSIC", "SPACE", "GHOST"],
        6: ["ACTIVE", "BRIGHT", "FUTURE", "PLAYER", "WONDER", "STREET", "PLANET", "SYSTEM", "ACTION", "SILVER"],
        8: ["PLATINUM", "MOUNTAIN", "STRATEGY", "CREATIVE", "UNIVERSE", "CHAMPION", "KNOWLEDGE", "STRENGTH", "BUSINESS", "COMPUTER"]
    };

    function go(id) {
        if(window.event) window.event.stopPropagation();
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function setMode(m) {
        mode = m;
        document.getElementById('mode-title').innerText = m + " LETTERS";
        renderMissions();
        go('scr-mission');
    }

    function renderMissions() {
        const list = document.getElementById('m-list');
        list.innerHTML = '';
        const unlocked = parseInt(localStorage.getItem('rb_v6_mode_' + mode)) || 1;
        for(let i=1; i<=50; i++) {
            const d = document.createElement('div');
            d.className = `m-node ${i <= unlocked ? 'm-unlocked' : ''}`;
            d.innerText = i;
            if(i <= unlocked) { d.onpointerdown = (e) => { e.stopPropagation(); lvl = i; startLevel(); }; }
            list.appendChild(d);
        }
    }

    function startLevel() {
        activeWord = bank[mode][(lvl-1) % bank[mode].length];
        setupBoard();
        go('scr-game');
    }

    function setupBoard() {
        const preview = document.getElementById('preview-bar');
        const board = document.getElementById('game-board');
        preview.innerHTML = ''; board.innerHTML = ''; selected = [];
        document.getElementById('msg').innerText = "CONNECT THE WORD";
        for(let i=0; i<activeWord.length; i++) {
            const s = document.createElement('div'); s.className = 'slot'; s.id = 'slot-'+i;
            preview.appendChild(s);
        }
        const chars = activeWord.split('').sort(() => Math.random() - 0.5);
        chars.forEach(c => {
            const n = document.createElement('div');
            n.className = 'hex-node'; n.innerText = c;
            n.onpointerdown = (e) => startDrag(e, n);
            board.appendChild(n);
        });
    }

    function startDrag(e, node) {
        e.stopPropagation();
        isDrawing = true;
        node.releasePointerCapture(e.pointerId);
        selectNode(node);
        window.onpointermove = (ev) => {
            if(!isDrawing) return;
            const target = document.elementFromPoint(ev.clientX, ev.clientY);
            if(target && target.classList.contains('hex-node') && !selected.includes(target)) selectNode(target);
        };
        window.onpointerup = () => { isDrawing = false; window.onpointermove = null; checkWord(); };
    }

    function selectNode(node) {
        selected.push(node);
        node.classList.add('hex-active');
        const str = selected.map(n => n.innerText).join('');
        for(let i=0; i<activeWord.length; i++) {
            const s = document.getElementById('slot-'+i);
            if(s) s.innerText = str[i] || "";
        }
    }

    function checkWord() {
        const str = selected.map(n => n.innerText).join('');
        if(str === activeWord) {
            document.getElementById('msg').innerText = "SUCCESS!";
            let currentUnlocked = parseInt(localStorage.getItem('rb_v6_mode_' + mode)) || 1;
            if(lvl == currentUnlocked) localStorage.setItem('rb_v6_mode_' + mode, currentUnlocked + 1);
            setTimeout(() => { renderMissions(); go('scr-mission'); }, 800);
        } else {
            document.getElementById('msg').innerText = "TRY AGAIN";
            setTimeout(() => {
                selected.forEach(n => n.classList.remove('hex-active'));
                selected = [];
                for(let i=0; i<activeWord.length; i++) document.getElementById('slot-'+i).innerText = "";
            }, 300);
        }
    }

    function getHint(e) {
        e.preventDefault();
        e.stopPropagation();
        
        const shield = document.getElementById('shield');
        shield.style.display = 'block'; // Activate shield
        
        window.open("https://www.profitablecpmratenetwork.com/kcyc4amqi?key=24503b450eb58c41a82c4231af9397cd", "_blank");
        document.getElementById('msg').innerText = "HINT: " + activeWord[0];
        
        // Disable shield after 1 second so user can play again
        setTimeout(() => { shield.style.display = 'none'; }, 1000);
    }
</script>
</body>
</html>
