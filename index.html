<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Royal Blocks - Mobile Stable</title>
    
    <script src="https://pl28980106.profitablecpmratenetwork.com/20/bd/f4/20bdf4fc49430a4adf6663e28963e137.js"></script>

    <style>
        :root { --gold: #FFD700; --bg: #3a221a; --text: #ffffff; }
        * { touch-action: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Arial Black', sans-serif; overflow: hidden; position: fixed; }
        
        #app { display: flex; flex-direction: column; height: 100vh; width: 100vw; }

        /* ADS - Mobile Optimized Height */
        .ad-container { width: 100%; background: #000; display: flex; justify-content: center; align-items: center; flex-shrink: 0; z-index: 5000; }
        .ad-top { height: 60px; border-bottom: 2px solid var(--gold); }
        .ad-bottom { height: 90px; border-top: 2px solid var(--gold); padding-bottom: 5px; } /* Increased for better visibility */

        .screen-container { flex-grow: 1; position: relative; z-index: 100; }
        .screen { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: var(--bg); }
        .active { display: flex !important; }

        /* ANTI-GHOST OVERLAY (Critical for Hint Fix) */
        #interaction-shield { position: fixed; inset: 0; z-index: 9999; display: none; background: transparent; pointer-events: auto; }

        .logo-text-main { font-size: 3rem; font-weight: 900; color: var(--gold); text-align: center; margin-bottom: 20px; }
        .btn-outline { background: rgba(255, 215, 0, 0.1); border: 2.5px solid var(--gold); color: var(--gold); padding: 16px 32px; border-radius: 15px; cursor: pointer; margin: 10px; min-width: 220px; font-weight: 900; text-transform: uppercase; }
        
        .mission-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; padding: 20px; max-width: 360px; overflow-y: auto; }
        .m-node { aspect-ratio: 1; background: #222; border: 2px solid #444; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #555; font-size: 18px; }
        .m-unlocked { border-color: var(--gold); color: var(--gold); background: #1a1a1a; box-shadow: 0 0 8px rgba(255,215,0,0.3); }

        #game-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .hex-node { width: 75px; height: 75px; background: #111; border: 2.5px solid var(--gold); clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 900; color: var(--gold); }
        .hex-active { background: var(--gold); color: #000; transform: scale(1.15); box-shadow: 0 0 25px var(--gold); }
    </style>
</head>
<body>

<div id="interaction-shield"></div>

<div id="app">
    <div class="ad-container ad-top">
        <script type="text/javascript">
            atOptions = { 'key' : 'e554307db5af71bb93a1bdbca30869f3', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
            document.write('<scr' + 'ipt type="text/javascript" src="https://www.highperformanceformat.com/e554307db5af71bb93a1bdbca30869f3/invoke.js"></scr' + 'ipt>');
        </script>
    </div>

    <div class="screen-container">
        <div id="scr-start" class="screen active">
            <div class="logo-text-main">ROYAL<br><span style="font-size: 1.8rem;">BLOCKS</span></div>
            <button class="btn-outline" onpointerdown="go('scr-mode')">PLAY GAME</button>
        </div>

        <div id="scr-mode" class="screen">
            <h2 style="color:var(--gold); letter-spacing: 2px;">SELECT MODE</h2>
            <button class="btn-outline" onpointerdown="setMode(5)">5 LETTERS</button>
            <button class="btn-outline" onpointerdown="setMode(6)">6 LETTERS</button>
            <button class="btn-outline" onpointerdown="setMode(8)">8 LETTERS</button>
        </div>

        <div id="scr-mission" class="screen">
            <h3 id="mode-title" style="color:var(--gold)"></h3>
            <div class="mission-grid" id="m-list"></div>
            <button class="btn-outline" style="min-width:150px; margin-top:20px;" onpointerdown="go('scr-mode')">BACK</button>
        </div>

        <div id="scr-game" class="screen">
            <div id="preview-bar" style="display:flex; gap:10px; margin-bottom:30px;"></div>
            <div id="game-board"></div>
            <div id="msg" style="height:35px; margin:15px; color:var(--gold); font-weight:bold;">READY?</div>
            <div style="display:flex; gap:15px;">
                <button class="btn-outline" style="min-width:110px; padding:12px;" onpointerdown="startLevel()">RESET</button>
                <button onpointerdown="getHint(event)" style="background:var(--gold); border:none; padding:14px 35px; border-radius:50px; font-weight:900; color:#000; font-size:1.1rem;">HINT</button>
            </div>
            <button style="background:none; border:none; color:#777; margin-top:30px; font-weight:bold;" onpointerdown="go('scr-mission')">QUIT</button>
        </div>
    </div>

    <div class="ad-container ad-bottom">
        <script type="text/javascript">
            atOptions = { 'key' : 'ba4d673a74e1bec3358fc1f6be3542c3', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
            document.write('<scr' + 'ipt type="text/javascript" src="https://www.highperformanceformat.com/ba4d673a74e1bec3358fc1f6be3542c3/invoke.js"></scr' + 'ipt>');
        </script>
    </div>
</div>

<script>
    let mode = 5, lvl = 1, activeWord = "", selected = [], isDrawing = false;
    const bank = {
        5: ["ROYAL", "SMART", "LIGHT", "DREAM", "POWER", "BRAIN", "WORLD", "MUSIC", "SPACE", "GHOST"],
        6: ["ACTIVE", "BRIGHT", "FUTURE", "PLAYER", "WONDER", "STREET", "PLANET", "SYSTEM", "ACTION", "SILVER"],
        8: ["PLATINUM", "MOUNTAIN", "STRATEGY", "CREATIVE", "UNIVERSE", "CHAMPION", "KNOWLEDGE", "STRENGTH", "BUSINESS", "COMPUTER"]
    };

    function go(id) {
        if(window.event) { window.event.preventDefault(); window.event.stopPropagation(); }
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function setMode(m) {
        mode = m;
        document.getElementById('mode-title').innerText = m + " LETTERS";
        renderMissions();
        go('scr-mission');
    }

    function renderMissions() {
        const list = document.getElementById('m-list');
        list.innerHTML = '';
        const unlocked = parseInt(localStorage.getItem('rb_v8_' + mode)) || 1;
        for(let i=1; i<=50; i++) {
            const d = document.createElement('div');
            d.className = `m-node ${i <= unlocked ? 'm-unlocked' : ''}`;
            d.innerText = i;
            if(i <= unlocked) {
                d.onpointerdown = (e) => { e.stopPropagation(); lvl = i; startLevel(); };
            }
            list.appendChild(d);
        }
    }

    function startLevel() {
        activeWord = bank[mode][(lvl-1) % bank[mode].length];
        setupBoard();
        go('scr-game');
    }

    function setupBoard() {
        const preview = document.getElementById('preview-bar');
        const board = document.getElementById('game-board');
        preview.innerHTML = ''; board.innerHTML = ''; selected = [];
        document.getElementById('msg').innerText = "CONNECT THE WORD";
        for(let i=0; i<activeWord.length; i++) {
            const s = document.createElement('div'); 
            s.style.cssText = "width:35px; height:40px; border-bottom:4px solid var(--gold); display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--gold); font-weight:900;";
            s.id = 'slot-'+i;
            preview.appendChild(s);
        }
        const chars = activeWord.split('').sort(() => Math.random() - 0.5);
        chars.forEach(c => {
            const n = document.createElement('div');
            n.className = 'hex-node'; n.innerText = c;
            n.onpointerdown = (e) => startDrag(e, n);
            board.appendChild(n);
        });
    }

    function startDrag(e, node) {
        e.preventDefault(); e.stopPropagation();
        isDrawing = true;
        node.releasePointerCapture(e.pointerId);
        selectNode(node);
        window.onpointermove = (ev) => {
            if(!isDrawing) return;
            const target = document.elementFromPoint(ev.clientX, ev.clientY);
            if(target && target.classList.contains('hex-node') && !selected.includes(target)) selectNode(target);
        };
        window.onpointerup = () => { isDrawing = false; window.onpointermove = null; checkWord(); };
    }

    function selectNode(node) {
        selected.push(node);
        node.classList.add('hex-active');
        const str = selected.map(n => n.innerText).join('');
        for(let i=0; i<activeWord.length; i++) {
            const s = document.getElementById('slot-'+i);
            if(s) s.innerText = str[i] || "";
        }
    }

    function checkWord() {
        const str = selected.map(n => n.innerText).join('');
        if(str === activeWord) {
            document.getElementById('msg').innerText = "SUCCESS!";
            let currentUnlocked = parseInt(localStorage.getItem('rb_v8_' + mode)) || 1;
            if(lvl == currentUnlocked) localStorage.setItem('rb_v8_' + mode, currentUnlocked + 1);
            setTimeout(() => { renderMissions(); go('scr-mission'); }, 800);
        } else {
            document.getElementById('msg').innerText = "TRY AGAIN";
            setTimeout(() => {
                selected.forEach(n => n.classList.remove('hex-active'));
                selected = [];
                for(let i=0; i<activeWord.length; i++) document.getElementById('slot-'+i).innerText = "";
            }, 300);
        }
    }

    // FINAL REFINED HINT LOGIC
    function getHint(e) {
        e.preventDefault(); e.stopPropagation();
        
        // 1. BLOCK ALL INTERACTIONS
        const shield = document.getElementById('interaction-shield');
        shield.style.display = 'block';

        // 2. OPEN LINK ASYNC (To trick ad scripts)
        setTimeout(() => {
            const win = window.open("https://www.profitablecpmratenetwork.com/kcyc4amqi?key=24503b450eb58c41a82c4231af9397cd", "_blank");
            if(win) win.blur();
            window.focus();
        }, 10);
        
        document.getElementById('msg').innerText = "HINT: " + activeWord[0];
        
        // 3. KEEP SHIELD ACTIVE LONGER (To swallow ghost clicks)
        setTimeout(() => {
            shield.style.display = 'none';
        }, 2000);

        return false;
    }
</script>
</body>
</html>
