<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Royal Blocks - Banner Fix</title>
    
    <script src="https://pl28980106.profitablecpmratenetwork.com/20/bd/f4/20bdf4fc49430a4adf6663e28963e137.js"></script>

    <style>
        :root { --gold: #FFD700; --bg: #3a221a; --text: #ffffff; }
        * { touch-action: none; -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--text); font-family: 'Arial Black', sans-serif; overflow: hidden; }
        
        /* FIXED POSITION ADS - Standard for Mobile Games */
        .ad-top { 
            position: fixed; top: 0; left: 0; width: 100%; 
            height: 50px; background: #000; z-index: 9999; 
            display: flex; justify-content: center; align-items: center;
            border-bottom: 1px solid var(--gold);
        }
        .ad-bottom { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            height: 60px; background: #000; z-index: 9999; 
            display: flex; justify-content: center; align-items: center;
            border-top: 1px solid var(--gold);
        }

        /* MAIN GAME AREA */
        #app { 
            position: absolute; 
            top: 50px; bottom: 60px; /* Space for ads */
            left: 0; right: 0;
            overflow: hidden;
        }

        .screen { 
            position: absolute; inset: 0; 
            display: none; flex-direction: column; 
            align-items: center; justify-content: center; 
            background: var(--bg); 
        }
        .active { display: flex !important; }

        #interaction-shield { position: fixed; inset: 0; z-index: 10000; display: none; background: transparent; }

        /* UI ELEMENTS */
        .logo-text-main { font-size: 2.8rem; font-weight: 900; color: var(--gold); text-align: center; }
        .btn-outline { background: rgba(255, 215, 0, 0.1); border: 2px solid var(--gold); color: var(--gold); padding: 15px 30px; border-radius: 12px; cursor: pointer; margin: 8px; min-width: 200px; font-weight: bold; }
        
        #game-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; }
        .hex-node { width: 65px; height: 65px; background: #111; border: 2px solid var(--gold); clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: var(--gold); }
        .hex-active { background: var(--gold); color: #000; scale: 1.1; }
        .slot { width: 32px; height: 38px; border-bottom: 3px solid var(--gold); display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--gold); font-weight: 900; }
    </style>
</head>
<body>

<div id="interaction-shield"></div>

<div class="ad-top">
    <script type="text/javascript">
        atOptions = { 'key' : 'e554307db5af71bb93a1bdbca30869f3', 'format' : 'iframe', 'height' : 50, 'width' : 320, 'params' : {} };
        document.write('<scr' + 'ipt type="text/javascript" src="https://www.highperformanceformat.com/e554307db5af71bb93a1bdbca30869f3/invoke.js"></scr' + 'ipt>');
    </script>
</div>

<div id="app">
    <div id="scr-start" class="screen active">
        <div class="logo-text-main">ROYAL<br><span style="font-size: 1.6rem;">BLOCKS</span></div>
        <button class="btn-outline" style="margin-top:30px;" onpointerdown="go('scr-mode')">START</button>
    </div>

    <div id="scr-mode" class="screen">
        <h2 style="color:var(--gold);">LEVELS</h2>
        <button class="btn-outline" onpointerdown="setMode(5)">5 LETTERS</button>
        <button class="btn-outline" onpointerdown="setMode(6)">6 LETTERS</button>
        <button class="btn-outline" onpointerdown="setMode(8)">8 LETTERS</button>
    </div>

    <div id="scr-mission" class="screen">
        <h3 id="mode-title" style="color:var(--gold)"></h3>
        <div id="m-list" style="display:grid; grid-template-columns:repeat(5,1fr); gap:8px; padding:15px;"></div>
        <button class="btn-outline" style="min-width:140px;" onpointerdown="go('scr-mode')">BACK</button>
    </div>

    <div id="scr-game" class="screen">
        <div id="preview-bar" style="display:flex; gap:8px; margin-bottom:20px;"></div>
        <div id="game-board"></div>
        <div id="msg" style="height:30px; color:var(--gold); font-size: 14px;">DRAG TO CONNECT</div>
        <div style="display:flex; gap:10px;">
            <button class="btn-outline" style="min-width:100px; padding:10px;" onpointerdown="startLevel()">RESET</button>
            <button onpointerdown="getHint(event)" style="background:var(--gold); border:none; padding:10px 25px; border-radius:50px; font-weight:bold; color:#000;">HINT</button>
        </div>
        <button style="background:none; border:none; color:#666; margin-top:20px;" onpointerdown="go('scr-mission')">QUIT</button>
    </div>
</div>

<div class="ad-bottom">
    <script type="text/javascript">
        atOptions = { 'key' : 'ba4d673a74e1bec3358fc1f6be3542c3', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
        document.write('<scr' + 'ipt type="text/javascript" src="https://www.highperformanceformat.com/ba4d673a74e1bec3358fc1f6be3542c3/invoke.js"></scr' + 'ipt>');
    </script>
</div>

<script>
    let mode = 5, lvl = 1, activeWord = "", selected = [], isDrawing = false;
    const bank = {
        5: ["ROYAL", "SMART", "LIGHT", "DREAM", "POWER", "BRAIN", "WORLD", "MUSIC", "SPACE", "GHOST"],
        6: ["ACTIVE", "BRIGHT", "FUTURE", "PLAYER", "WONDER", "STREET", "PLANET", "SYSTEM", "ACTION", "SILVER"],
        8: ["PLATINUM", "MOUNTAIN", "STRATEGY", "CREATIVE", "UNIVERSE", "CHAMPION", "KNOWLEDGE", "STRENGTH", "BUSINESS", "COMPUTER"]
    };

    function go(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function setMode(m) {
        mode = m;
        document.getElementById('mode-title').innerText = m + " LETTERS";
        renderMissions();
        go('scr-mission');
    }

    function renderMissions() {
        const list = document.getElementById('m-list');
        list.innerHTML = '';
        const unlocked = parseInt(localStorage.getItem('rb_final_' + mode)) || 1;
        for(let i=1; i<=25; i++) {
            const d = document.createElement('div');
            d.className = 'hex-node'; // Using hex-node style for missions too
            d.style.width = '50px'; d.style.height = '50px'; d.style.fontSize = '16px';
            d.style.opacity = i <= unlocked ? '1' : '0.3';
            d.innerText = i;
            if(i <= unlocked) d.onpointerdown = () => { lvl = i; startLevel(); };
            list.appendChild(d);
        }
    }

    function startLevel() {
        activeWord = bank[mode][(lvl-1) % bank[mode].length];
        setupBoard();
        go('scr-game');
    }

    function setupBoard() {
        const preview = document.getElementById('preview-bar');
        const board = document.getElementById('game-board');
        preview.innerHTML = ''; board.innerHTML = ''; selected = [];
        for(let i=0; i<activeWord.length; i++) {
            const s = document.createElement('div'); s.className = 'slot'; s.id = 'slot-'+i;
            preview.appendChild(s);
        }
        activeWord.split('').sort(() => Math.random() - 0.5).forEach(c => {
            const n = document.createElement('div');
            n.className = 'hex-node'; n.innerText = c;
            n.onpointerdown = (e) => startDrag(e, n);
            board.appendChild(n);
        });
    }

    function startDrag(e, node) {
        e.stopPropagation(); isDrawing = true;
        node.releasePointerCapture(e.pointerId);
        selectNode(node);
        window.onpointermove = (ev) => {
            if(!isDrawing) return;
            const target = document.elementFromPoint(ev.clientX, ev.clientY);
            if(target && target.classList.contains('hex-node') && !selected.includes(target)) selectNode(target);
        };
        window.onpointerup = () => { isDrawing = false; checkWord(); };
    }

    function selectNode(node) {
        selected.push(node);
        node.classList.add('hex-active');
        const str = selected.map(n => n.innerText).join('');
        for(let i=0; i<activeWord.length; i++) {
            const s = document.getElementById('slot-'+i);
            if(s) s.innerText = str[i] || "";
        }
    }

    function checkWord() {
        const str = selected.map(n => n.innerText).join('');
        if(str === activeWord) {
            document.getElementById('msg').innerText = "SUCCESS!";
            let current = parseInt(localStorage.getItem('rb_final_' + mode)) || 1;
            if(lvl == current) localStorage.setItem('rb_final_' + mode, current + 1);
            setTimeout(() => { renderMissions(); go('scr-mission'); }, 800);
        } else {
            document.getElementById('msg').innerText = "TRY AGAIN";
            setTimeout(() => {
                selected.forEach(n => n.classList.remove('hex-active'));
                selected = [];
                for(let i=0; i<activeWord.length; i++) document.getElementById('slot-'+i).innerText = "";
            }, 300);
        }
    }

    function getHint(e) {
        e.preventDefault(); e.stopPropagation();
        const shield = document.getElementById('interaction-shield');
        shield.style.display = 'block';
        window.open("https://www.profitablecpmratenetwork.com/kcyc4amqi?key=24503b450eb58c41a82c4231af9397cd", "_blank");
        document.getElementById('msg').innerText = "HINT: " + activeWord[0];
        setTimeout(() => { shield.style.display = 'none'; }, 2000);
    }
</script>
</body>
</html>
